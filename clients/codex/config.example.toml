[mcp_servers.coating-process]
command = "coating-mcp"
args = []
startup_timeout_sec = 20

[mcp_servers.coating-process.env]
PYTHONUTF8 = "1"
PYTHONIOENCODING = "utf-8"
FASTMCP_SHOW_SERVER_BANNER = "false"
FASTMCP_ENABLE_RICH_LOGGING = "false"
FASTMCP_LOG_LEVEL = "WARNING"

[mcp_servers.coating-process-windows-venv]
command = "C:\\venvs\\coating-mcp\\Scripts\\coating-mcp.exe"
args = []
startup_timeout_sec = 20

[mcp_servers.coating-process-windows-venv.env]
PYTHONUTF8 = "1"
PYTHONIOENCODING = "utf-8"
PYTHONNOUSERSITE = "1"
FASTMCP_SHOW_SERVER_BANNER = "false"
FASTMCP_ENABLE_RICH_LOGGING = "false"
FASTMCP_LOG_LEVEL = "WARNING"

[mcp_servers.coating-process-docker]
command = "docker"
args = [
  "run",
  "--rm",
  "-i",
  "coating-process-mcp:latest",
]
startup_timeout_sec = 20
